<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Late FC Profes">
  <meta name="theme-color" content="#0f1117">
  <link rel="manifest" href="manifest.json">
  <title>Late FC - Profes</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0f1117;--surface:#181c27;--surface2:#1e2433;--border:#2a3045;
      --text:#e8ecf4;--muted:#8491a8;--accent:#3b82f6;
      --green:#22c55e;--red:#f87171;--purple:#a78bfa;--orange:#fb923c;
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);
      min-height:100vh;min-height:-webkit-fill-available;overflow-x:hidden;}
    html{height:-webkit-fill-available;}

    /* LOADER */
    #loader{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:9999;}
    .spinner{width:48px;height:48px;border:4px solid var(--surface2);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .loader-text{margin-top:14px;font-size:13px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.05em;}

    /* LOGIN */
    #login-screen{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;align-items:center;justify-content:center;padding:24px;}
    .login-card{background:var(--surface2);padding:36px 28px;border-radius:20px;border:1px solid var(--accent);text-align:center;width:100%;max-width:340px;box-shadow:0 20px 60px rgba(0,0,0,.6);}
    .login-logo{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
    .login-logo span{color:var(--accent);}
    .login-sub{color:var(--muted);font-size:12px;margin-bottom:24px;text-transform:uppercase;letter-spacing:.05em;}
    .login-input{width:100%;padding:14px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:10px;font-size:16px;margin-bottom:12px;text-align:center;font-family:'Barlow Condensed',sans-serif;outline:none;}
    .login-input:focus{border-color:var(--accent);}
    .login-error{color:var(--red);font-size:12px;margin-bottom:10px;display:none;}
    .login-btn{width:100%;padding:14px;background:var(--green);color:white;border:none;border-radius:10px;font-size:15px;font-weight:800;cursor:pointer;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.05em;}

    /* LAYOUT */
    #app{display:flex;flex-direction:column;height:100vh;height:-webkit-fill-available;}
    .app-header{background:var(--surface);border-bottom:2px solid var(--accent);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .app-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;}
    .app-title span{color:var(--accent);}
    .tab-content{flex:1;overflow-y:auto;padding:16px;padding-bottom:80px;}

    /* BOTTOM NAV */
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
    .bottom-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0;cursor:pointer;color:var(--muted);border:none;background:none;font-size:10px;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.04em;gap:4px;transition:color .15s;}
    .bottom-tab .tab-icon{font-size:22px;line-height:1;}
    .bottom-tab.active{color:var(--accent);}
    .bottom-tab.active .tab-indicator{width:24px;height:3px;background:var(--accent);border-radius:2px;margin-top:2px;}

    /* FILTROS */
    .filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
    .filter-input{flex:1;min-width:120px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:10px 14px;font-size:13px;outline:none;font-family:'Barlow',sans-serif;}
    .filter-input:focus{border-color:var(--accent);}
    .filter-select{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:10px 12px;font-size:13px;outline:none;font-family:'Barlow',sans-serif;}
    .filter-select:focus{border-color:var(--accent);}

    /* PLAYER CARDS */
    .player-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;}
    .player-name{font-size:16px;font-weight:800;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;line-height:1.2;margin-bottom:6px;}
    .cat-pill{display:inline-block;padding:2px 10px;border-radius:20px;font-size:10px;font-weight:800;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;}
    .wa-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;background:#25D366;color:white;border-radius:8px;font-size:12px;font-weight:700;font-family:'Barlow Condensed',sans-serif;text-decoration:none;text-transform:uppercase;margin-top:6px;margin-right:6px;}

    /* ASISTENCIA */
    .asist-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:16px;}
    .asist-header{background:var(--surface);padding:14px 16px;border-bottom:1px solid var(--border);}
    .asist-title{font-size:15px;font-weight:800;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;color:var(--accent);}
    .asist-sub{font-size:11px;color:var(--muted);margin-top:3px;}
    .asist-stats{display:flex;gap:0;border-bottom:1px solid var(--border);}
    .astat{flex:1;text-align:center;padding:12px 8px;border-right:1px solid var(--border);}
    .astat:last-child{border-right:none;}
    .astat-n{font-size:22px;font-weight:800;font-family:'Barlow Condensed',sans-serif;}
    .astat-l{font-size:9px;color:var(--muted);text-transform:uppercase;margin-top:2px;}
    .green{color:var(--green);}
    .red{color:var(--red);}
    .purple{color:var(--purple);}
    .muted{color:var(--muted);}
    .asist-toolbar{display:flex;gap:8px;padding:10px 12px;background:var(--bg);border-bottom:1px solid var(--border);}
    .asist-search{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 12px;font-size:13px;outline:none;}
    .btn-todos{padding:9px 14px;background:var(--accent);color:white;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;white-space:nowrap;}
    .asist-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border);}
    .asist-row:last-child{border-bottom:none;}
    .asist-avatar{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:white;}
    img.asist-avatar{display:block;}
    .asist-info{flex:1;min-width:0;}
    .asist-nombre{font-size:14px;font-weight:700;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;}
    .asist-cat{font-size:11px;color:var(--muted);}
    .save-bar{padding:12px 14px;border-top:2px solid var(--accent);background:var(--surface);}
    .btn-guardar{width:100%;padding:14px;background:var(--green);color:white;border:none;border-radius:10px;font-size:15px;font-weight:800;cursor:pointer;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.05em;transition:background .2s;}
    .btn-guardar:disabled{opacity:.6;cursor:not-allowed;}

    /* TOGGLE */
    .toggle-btn{width:52px;height:28px;border-radius:14px;border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
    .toggle-btn.presente{background:var(--green);}
    .toggle-btn.ausente{background:var(--border);}
    .toggle-btn::after{content:'';position:absolute;width:22px;height:22px;border-radius:50%;background:white;top:3px;transition:left .2s;}
    .toggle-btn.presente::after{left:27px;}
    .toggle-btn.ausente::after{left:3px;}

    /* SELECTOR ASIST */
    .asist-selector{background:var(--surface2);border-radius:14px;border:1px solid var(--border);padding:16px;margin-bottom:16px;display:flex;flex-direction:column;gap:10px;}
    .sel-row{display:flex;gap:10px;align-items:flex-end;}
    .sel-group{display:flex;flex-direction:column;gap:4px;flex:1;}
    .sel-label{font-size:10px;color:var(--muted);text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;letter-spacing:.05em;}
    .btn-cargar{padding:11px 16px;background:var(--purple);color:#0f1117;border:none;border-radius:10px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;white-space:nowrap;}

    .empty-msg{text-align:center;padding:48px 20px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:16px;text-transform:uppercase;}
  </style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="spinner"></div>
  <p id="loader-msg" class="loader-text">Cargando...</p>
</div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">LATE <span>FC</span></div>
    <div class="login-sub">App Profesores</div>
    <input type="password" id="passInput" class="login-input" placeholder="CONTRASENA" onkeyup="if(event.key==='Enter')intentarLogin()">
    <div id="loginError" class="login-error">Contrasena incorrecta</div>
    <button class="login-btn" onclick="intentarLogin()">ENTRAR</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="app-header">
    <div class="app-title">LATE <span>FC</span></div>
    <div style="font-size:11px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;">Profesores</div>
  </div>

  <!-- TAB JUGADORES -->
  <div id="tab-jugadores" class="tab-content">
    <div class="filters">
      <input type="text" id="jugBusq" class="filter-input" placeholder="Buscar jugador..." oninput="renderJugadores()">
      <select id="jugCat" class="filter-select" onchange="renderJugadores()"><option value="">Todas</option></select>
    </div>
    <div id="gridJugadores"></div>
  </div>

  <!-- TAB ASISTENCIAS -->
  <div id="tab-asistencias" class="tab-content" style="display:none;">
    <div class="asist-selector">
      <div class="sel-group">
        <span class="sel-label">Fecha</span>
        <input type="date" id="asistFecha" class="filter-input">
      </div>
      <div class="sel-group">
        <span class="sel-label">Turno</span>
        <select id="asistTurno" class="filter-select" style="width:100%;"><option value="">-- Sin turno --</option></select>
      </div>
      <div class="sel-group">
        <span class="sel-label">Categoria</span>
        <select id="asistCat" class="filter-select" style="width:100%;"><option value="">Todas</option></select>
      </div>
      <div class="sel-row" style="justify-content:flex-end;">
        <button class="btn-cargar" onclick="cargarListaAsist()">CARGAR LISTA</button>
      </div>
    </div>
    <div id="asistContenido">
      <div class="empty-msg">Selecciona fecha y turno para tomar asistencia</div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="bottom-tab active" id="bt-jugadores" onclick="cambiarTab('jugadores')">
      <div class="tab-icon">&#128101;</div>
      <span>Jugadores</span>
    </button>
    <button class="bottom-tab" id="bt-asistencias" onclick="cambiarTab('asistencias')">
      <div class="tab-icon">&#128203;</div>
      <span>Asistencias</span>
    </button>
  </nav>
</div>

<script>
var DB={jugadores:[],categorias:[],horarios:[]};
var TOKEN='',asistencias=[],asistActual={};

function intentarLogin(){
  TOKEN=document.getElementById('passInput').value;
  if(!TOKEN)return;
  mostrarLoader('Cargando...');
  google.script.run
    .withSuccessHandler(function(raw){
      var d=JSON.parse(raw);
      if(d.error){
        ocultarLoader();
        document.getElementById('loginError').style.display='block';
        TOKEN='';return;
      }
      document.getElementById('login-screen').style.display='none';
      DB=d;
      google.script.run
        .withSuccessHandler(function(r){asistencias=JSON.parse(r);renderAll();ocultarLoader();})
        .withFailureHandler(function(){renderAll();ocultarLoader();})
        .getAsistenciasProfes(TOKEN);
    })
    .withFailureHandler(function(){
      ocultarLoader();
      document.getElementById('loginError').style.display='block';
      TOKEN='';
    })
    .getDataProfes(TOKEN);
}
function mostrarLoader(m){document.getElementById('loader').style.display='flex';document.getElementById('loader-msg').innerText=m;}
function ocultarLoader(){document.getElementById('loader').style.display='none';}

function renderAll(){
  poblarFiltros();
  renderJugadores();
  document.getElementById('asistFecha').value=new Date().toISOString().split('T')[0];
}

function cambiarTab(id){
  document.querySelectorAll('.tab-content').forEach(function(c){c.style.display='none';});
  document.getElementById('tab-'+id).style.display='block';
  document.querySelectorAll('.bottom-tab').forEach(function(t){t.classList.remove('active');});
  document.getElementById('bt-'+id).classList.add('active');
}

// --- JUGADORES ---
function renderJugadores(){
  var busq=document.getElementById('jugBusq').value.toLowerCase();
  var catF=document.getElementById('jugCat').value;
  var grid=document.getElementById('gridJugadores');
  var activos=DB.jugadores.filter(function(f){return f[12]===true||f[12]==='true';});
  var html='';
  activos.forEach(function(f){
    var nom=f[1]||'',dni=(f[2]||'').toString(),cat=f[13]||'',gen=f[11]||'';
    var foto=(f[14]||'').toString().trim();
    var e1=f[5]||'',e2=f[6]||'';
    var catObj=DB.categorias.find(function(c){return c[0]===cat;});
    var cc=catObj?catObj[1]:(gen==='Femenino'?'#ec4899':'#3b82f6');
    if(busq&&!nom.toLowerCase().includes(busq)&&!dni.includes(busq))return;
    if(catF&&cat!==catF)return;
    var fotoHtml=foto&&foto.startsWith('http')
      ?'<img src="'+foto+'" style="width:70px;height:70px;border-radius:50%;object-fit:cover;border:3px solid '+cc+';flex-shrink:0;">'
      :'<div style="width:70px;height:70px;border-radius:50%;background:'+cc+';display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:white;flex-shrink:0;">'+(nom.split(' ').slice(0,2).map(function(p){return(p[0]||'').toUpperCase();}).join(''))+'</div>';
    var wa1='',wa2='';
    if(e1&&e1!=='-'){
      var n1=e1.replace(/\D/g,'');
      if(n1.startsWith('11')||n1.startsWith('15')||n1.length===10)n1='549'+n1;
      else if(n1.startsWith('0'))n1='549'+n1.substring(1);
      wa1='<div style="font-size:11px;color:var(--muted);margin-top:5px;">'+e1+'</div>'
         +'<a href="https://wa.me/'+n1+'" target="_blank" class="wa-btn">WhatsApp E1</a>';
    }
    if(e2&&e2!=='-'){
      var n2=e2.replace(/\D/g,'');
      if(n2.startsWith('11')||n2.startsWith('15')||n2.length===10)n2='549'+n2;
      else if(n2.startsWith('0'))n2='549'+n2.substring(1);
      wa2='<div style="font-size:11px;color:var(--muted);margin-top:5px;">'+e2+'</div>'
         +'<a href="https://wa.me/'+n2+'" target="_blank" class="wa-btn">WhatsApp E2</a>';
    }
    html+='<div class="player-card" style="border-left:5px solid '+cc+';">';
    html+='<div style="display:flex;gap:14px;align-items:flex-start;">';
    html+=fotoHtml;
    html+='<div style="flex:1;min-width:0;">';
    html+='<div class="player-name">'+nom+'</div>';
    html+='<span class="cat-pill" style="background:'+cc+'22;color:'+cc+';border:1px solid '+cc+'44;">'+cat+'</span>';
    html+=(wa1||wa2)?'<div style="margin-top:6px;">'+wa1+wa2+'</div>':'<div style="font-size:11px;color:var(--muted);margin-top:6px;">Sin contactos</div>';
    html+='</div></div></div>';
  });
  grid.innerHTML=html||'<div style="text-align:center;padding:60px;color:var(--muted);">Sin jugadores</div>';
}

// --- ASISTENCIAS ---
function poblarFiltros(){
  var st=document.getElementById('asistTurno');
  st.innerHTML='<option value="">-- Seleccionar turno --</option>';
  DB.horarios.forEach(function(h,i){
    st.innerHTML+='<option value="'+i+'">'+h[0]+' '+h[1]+'hs - '+h[4]+' ('+h[2]+')</option>';
  });
  var sc=document.getElementById('asistCat');
  sc.innerHTML='<option value="">Todas</option>';
  DB.categorias.forEach(function(c){sc.innerHTML+='<option>'+c[0]+'</option>';});
  var jc=document.getElementById('jugCat');
  jc.innerHTML='<option value="">Todas</option>';
  DB.categorias.forEach(function(c){jc.innerHTML+='<option>'+c[0]+'</option>';});
}

function cargarListaAsist(){
  var ti=document.getElementById('asistTurno').value;
  var fecha=document.getElementById('asistFecha').value;
  var cf=document.getElementById('asistCat').value;
  var cont=document.getElementById('asistContenido');
  if(!fecha){cont.innerHTML='<div class="empty-msg">Selecciona una fecha</div>';return;}
  if(ti===''&&!cf){cont.innerHTML='<div class="empty-msg">Selecciona un turno o categoria</div>';return;}
  var catNom,turnoId,turnoLabel,hd=null;
  if(ti!==''){
    hd=DB.horarios[ti];catNom=cf||hd[4];
    turnoId=fecha+'_T'+ti+'_'+hd[4];turnoLabel=hd[0]+' '+hd[1]+'hs - '+hd[4];
  } else {
    catNom=cf;turnoId=fecha+'_libre_'+cf;turnoLabel='Clase libre - '+cf;
  }
  var jug=DB.jugadores.filter(function(f){return(f[12]===true||f[12]==='true')&&(catNom?f[13]===catNom:true);});
  asistActual={};
  asistencias.forEach(function(r){
    if(r[1]===turnoId){var v=r[5];asistActual[r[3]]=(v===true||String(v).toLowerCase()==='true');}
  });
  if(!asistencias.some(function(r){return r[1]===turnoId;}))jug.forEach(function(f){asistActual[f[2]]=true;});
  var pres=Object.values(asistActual).filter(Boolean).length;
  var aus=jug.length-pres;
  var pct=jug.length>0?Math.round(pres/jug.length*100):0;
  var ff=new Date(fecha+'T12:00:00').toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'});
  var html='<div class="asist-card">';
  html+='<div class="asist-header"><div class="asist-title">'+turnoLabel+'</div>';
  html+='<div class="asist-sub">'+(hd?'Sede: '+hd[2]+' | ':'')+ff+'</div></div>';
  html+='<div class="asist-stats">';
  html+='<div class="astat"><div class="astat-n green" id="cnt-p">'+pres+'</div><div class="astat-l">Presentes</div></div>';
  html+='<div class="astat"><div class="astat-n red" id="cnt-a">'+aus+'</div><div class="astat-l">Ausentes</div></div>';
  html+='<div class="astat"><div class="astat-n purple" id="cnt-pct">'+pct+'%</div><div class="astat-l">Asistencia</div></div>';
  html+='<div class="astat"><div class="astat-n muted">'+jug.length+'</div><div class="astat-l">Total</div></div>';
  html+='</div>';
  html+='<div class="asist-toolbar">';
  html+='<input type="text" id="asistBusq" placeholder="Filtrar..." oninput="filtrarAsist()" class="asist-search">';
  html+='<button onclick="todosPresentes('+jug.length+')" class="btn-todos">TODOS</button>';
  html+='</div>';
  if(!jug.length){html+='<div class="empty-msg">Sin jugadores en esta categoria</div>';}
  else{
    html+='<div id="asistRows">';
    jug.forEach(function(f){
      var pr=asistActual[f[2]]!==false;
      var catObj=DB.categorias.find(function(c){return c[0]===f[13];});
      var cc=catObj?catObj[1]:(f[11]==='Femenino'?'#ec4899':'#3b82f6');
      var foto=(f[14]||'').toString().trim();
      var fotoHtml=foto&&foto.startsWith('http')
        ?'<img src="'+foto+'" class="asist-avatar" style="border-color:'+cc+';">'
        :'<div class="asist-avatar" style="background:'+cc+';">'+(f[1]||'').split(' ').slice(0,2).map(function(p){return(p[0]||'').toUpperCase();}).join('')+'</div>';
      html+='<div class="asist-row" data-nombre="'+(f[1]||'').toLowerCase()+'">';
      html+=fotoHtml;
      html+='<div class="asist-info"><div class="asist-nombre">'+f[1]+'</div>';
      html+='<div class="asist-cat">'+f[13]+'</div></div>';
      html+='<button class="toggle-btn '+(pr?'presente':'ausente')+'" id="tog-'+f[2]+'" data-dni="'+f[2]+'" data-total="'+jug.length+'"></button>';
      html+='</div>';
    });
    html+='</div>';
  }
  html+='<div class="save-bar"><button id="btnGuardar" class="btn-guardar">GUARDAR ASISTENCIA</button></div>';
  html+='</div>';
  cont.innerHTML=html;
  cont.addEventListener('click',function(e){
    var btn=e.target.closest('.toggle-btn');
    if(btn)toggleAsist(btn.dataset.dni,parseInt(btn.dataset.total));
  });
  var bg=document.getElementById('btnGuardar');
  if(bg)bg.addEventListener('click',function(){guardarAsist(turnoId,turnoLabel);});
}

function filtrarAsist(){
  var b=document.getElementById('asistBusq').value.toLowerCase();
  document.querySelectorAll('#asistRows .asist-row').forEach(function(r){
    r.style.display=r.dataset.nombre.includes(b)?'':'none';
  });
}
function todosPresentes(total){
  Object.keys(asistActual).forEach(function(d){asistActual[d]=true;});
  document.querySelectorAll('.toggle-btn').forEach(function(b){b.className='toggle-btn presente';});
  var a=document.getElementById('cnt-p');if(a)a.innerText=total;
  var b=document.getElementById('cnt-a');if(b)b.innerText=0;
  var c=document.getElementById('cnt-pct');if(c)c.innerText='100%';
}
function toggleAsist(dni,total){
  asistActual[dni]=!asistActual[dni];
  var tog=document.getElementById('tog-'+dni);
  if(tog)tog.className='toggle-btn '+(asistActual[dni]?'presente':'ausente');
  var p=Object.values(asistActual).filter(Boolean).length;
  var a=document.getElementById('cnt-p');if(a)a.innerText=p;
  var b=document.getElementById('cnt-a');if(b)b.innerText=total-p;
  var c=document.getElementById('cnt-pct');if(c)c.innerText=total>0?Math.round(p/total*100)+'%':'0%';
}
function guardarAsist(tid,tlbl){
  var fecha=document.getElementById('asistFecha').value;if(!fecha)return;
  var regs=Object.entries(asistActual).map(function(e){
    var jug=DB.jugadores.find(function(f){return f[2]==e[0];});
    return[fecha,tid,tlbl,e[0],jug?jug[1]:e[0],(e[1]?'true':'false'),jug?jug[jug.length-2]:''];
  });
  if(!regs.length)return;
  var btn=document.getElementById('btnGuardar');
  if(btn){btn.innerText='GUARDANDO...';btn.disabled=true;btn.style.background='var(--muted)';}
  google.script.run
    .withSuccessHandler(function(){
      asistencias=asistencias.filter(function(r){return r[1]!==tid;}).concat(regs);
      if(btn){btn.innerText='GUARDADO';btn.style.background='var(--accent)';
        setTimeout(function(){btn.innerText='GUARDAR ASISTENCIA';btn.style.background='';btn.disabled=false;},2500);}
    })
    .withFailureHandler(function(e){
      alert('Error: '+e);
      if(btn){btn.innerText='GUARDAR ASISTENCIA';btn.disabled=false;btn.style.background='';}
    })
    .guardarAsistenciaProfes(regs,TOKEN);
}
</script>
